name: pmpp-audit

on:
  pull_request:

jobs:
  pmpp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Run pmpp audit
        run: |
          pmpp scan --mode audit --scope all --format json > pmpp-results.json
          cat pmpp-results.json

      - name: Post results as PR comment (if findings)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pmpp-results.json','utf8');
            let data = {};
            try { data = JSON.parse(body); } catch (e) { core.setFailed('Failed to parse pmpp-results.json'); }
            const count = (data.findings && data.findings.length) || 0;
            if (count > 0) {
              const short = JSON.stringify({ findings: data.findings.slice(0,10), count }, null, 2);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `pmpp found ${count} issue(s) in this PR. Summary:\n\n\`\`\`json\n${short}\n\`\`\`\n\nFull results attached to the workflow run artifacts.`
              });
              core.setFailed(`pmpp found ${count} issues`);
            } else {
              core.info('pmpp found no issues');
            }
